name: happiness_makers_app
description: "صناع السعادة - متجر الشوكولاتة والحلويات المستوردة"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Backend
  supabase_flutter: ^2.8.4

  # Navigation
  go_router: ^14.8.1

  # UI & Design
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  photo_view: ^0.15.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2

  # Utilities
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  shared_preferences: ^2.3.3
  intl: ^0.20.2

  # Icons
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
